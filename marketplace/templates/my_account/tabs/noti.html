<div id="notiTab"
     data-fragment-url="{% url 'my_account_noti_fragment' %}"
     data-read-url-template="{% url 'my_account_noti_mark_read' 0 %}"
     data-read-all-url="{% url 'my_account_noti_mark_all_read' %}">

  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
    <h2 class="text-xl font-bold flex items-center gap-2 text-gray-800">
      <svg class="w-7 h-7 text-orange-600" viewBox="0 0 24 24" fill="none">
        <path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7Z"
              stroke="currentColor" stroke-width="2"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"
              stroke="currentColor" stroke-width="2"/>
      </svg>
      الإشعارات
    </h2>

    <div class="flex flex-col sm:flex-row sm:items-center gap-3 w-full sm:w-auto">
      <div class="px-4 py-2 bg-gray-100 text-gray-700 border rounded-xl font-bold text-sm text-center w-full sm:w-auto">
        الإجمالي: <span id="notiTotal">0</span>
      </div>
      <div class="px-4 py-2 bg-orange-100 text-orange-700 border border-orange-300 rounded-xl font-bold text-sm flex items-center justify-center gap-2 w-full sm:w-auto">
        غير مقروء
        <span id="notiUnread"
              class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-orange-500 text-white text-xs font-extrabold">
          0
        </span>
      </div>
    </div>
  </div>

  <div id="notiLoader" class="noti-loader">جاري تحميل الإشعارات...</div>
  <div id="notiEmpty" class="noti-empty hidden">
    <svg class="noti-empty-ico" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7Z"
            stroke="currentColor" stroke-width="2"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"
            stroke="currentColor" stroke-width="2"/>
    </svg>
    <span>لا يوجد إشعارات حالياً</span>
  </div>
  <div id="notiContent" class="noti-content hidden"></div>
</div>
