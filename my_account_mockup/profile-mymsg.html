<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ركن — حسابي</title>

  
   <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
	 <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="../css/profile.css" />
    <script src="../js/profile-mymsg.js" defer></script>

  <style>
    
   
  </style>
</head>

<body class="bg-gray-50">

<div class="max-w-7xl mx-auto px-4 py-6">

  <h1 class="text-3xl font-extrabold text-gray-800 mb-5">👤  حسابي في ركن</h1>

  <!-- ✅ Mobile Tabs (only mobile) -->
  <div class="sticky top-0 z-50 bg-white border rounded-2xl mb-4">
    <div class="flex gap-3 overflow-x-auto lg:overflow-visible lg:flex-wrap lg:justify-center px-3 py-3 no-scrollbar">

      <button class="tab-btn  shrink-0" data-tab="info">
  <svg class="w-7 h-7" viewBox="0 0 24 24" fill="none">
    <path d="M12 20h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4 11.5-11.5Z"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  معلوماتي
</button>

      <button class="tab-btn shrink-0" data-tab="ads">
  <svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path d="M3 11v2a1 1 0 0 0 1 1h2l8 4V6l-8 4H4a1 1 0 0 0-1 1Z"
          stroke="currentColor" stroke-width="2"
          stroke-linejoin="round"/>
    <path d="M14 6v12"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round"/>
    <path d="M19 8a5 5 0 0 1 0 8"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round"/>
  </svg>
  إعلاناتي
</button>


      <button class="tab-btn shrink-0" data-tab="requests">
  <svg class="w-7 h-7" viewBox="0 0 24 24" fill="none">
    <circle cx="9" cy="20" r="1.5" fill="currentColor"/>
    <circle cx="17" cy="20" r="1.5" fill="currentColor"/>
    <path d="M3 4h2l2.4 12h10.2l2-8H6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </svg>
  طلباتي
</button>

      <button class="tab-btn shrink-0" data-tab="noti">
  <svg class="w-7 h-7" viewBox="0 0 24 24" fill="none">
    <path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7Z"
          stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="2"/>
  </svg>
  إشعارات
</button>

      <button class="tab-btn active shrink-0" data-tab="msgs">
  <svg class="w-7 h-7" viewBox="0 0 24 24" fill="none">
    <path d="M21 15a4 4 0 0 1-4 4H7l-4 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4Z"
          stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
  </svg>
  رسائل
</button>

      <button class="tab-btn shrink-0" data-tab="fav">
  <svg class="w-6 h-6 fav-heart-icon"
       viewBox="0 0 24 24"
       fill="none"
       stroke="currentColor"
       stroke-width="2"
       stroke-linecap="round"
       stroke-linejoin="round">
    <path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1
             a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21
             l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/>
  </svg>
  المفضلة
</button>



      <button class="tab-btn shrink-0" data-tab="wallet">
  <svg  width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-wallet-icon lucide-wallet"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></svg>
  المحفظة
</button>

    </div>
  </div>

  <div id="mainContentWrap" class="grid grid-cols-1 lg:grid-cols-4 gap-6">

 
    <!-- محتوى التبويبات -->
    <div class="lg:col-span-3 w-full min-w-0 ">
  <div id="tabsViewport"
       class="bg-transparent min-h-[85vh]">


</div>



      <!-- الرسائل -->
      <div id="tab-msgs" class="tab-content active bg-white border border-orange-500 rounded-2xl p-6">

       <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4">

  
  <!-- العنوان (يمين) -->
  <h2 class="text-xl font-bold flex items-center gap-2 text-gray-800">
    <svg class="w-7 h-7 text-orange-600" viewBox="0 0 24 24" fill="none">
      <path d="M21 15a4 4 0 0 1-4 4H7l-4 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4Z"
            stroke="currentColor" stroke-width="2"/>
    </svg>
    الرسائل
  </h2>

  <!-- العدادات (يسار) -->
  <div class="flex gap-2 text-sm font-semibold">
    <span class="px-4 py-2 bg-gray-100 text-gray-700 border rounded-xl font-bold text-sm text-center w-full sm:w-auto">
      الإجمالي: <span id="totalMsgs">0</span>
    </span>

    <span class="px-4 py-2 bg-orange-100 text-orange-700 border border-orange-300 rounded-xl font-bold text-sm
            flex items-center justify-center gap-2 w-full sm:w-auto">
      غير مقروء: <span id="unreadMsgs">0</span>
    </span>
  </div>

</div>



<div class="relative w-full mb-5">
  <input id="chatSearch" type="text" placeholder="ابحث عن محادثة..."
         class="w-full p-3 pr-10 border rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-orange-200 text-sm">

  <span class="absolute top-1/2 right-3 -translate-y-1/2 text-gray-400">
    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none">
      <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
      <path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2"/>
    </svg>
  </span>
</div>


        <div class="flex gap-2 mb-5 flex-wrap">
          <button class="chat-filter-btn active" data-filter="all">الكل</button>
          <button class="chat-filter-btn" data-filter="ad">إعلانات</button>
          <button class="chat-filter-btn" data-filter="request">طلبات</button>
		  <button class="chat-filter-btn" data-filter="store">
  المتجر
</button>

		  
        </div>
		
		

        <div id="conversationsList" class="space-y-3"></div>
      </div>

      <!-- شاشة المحادثة -->
      <div id="tab-chat" class="tab-content bg-white border rounded-2xl p-0">
        <div class="flex items-center justify-between gap-4 p-4 border-b bg-white sticky top-0 z-10">
          <div class="flex items-center gap-3">
            <img id="chatUserImg" src="https://i.pravatar.cc/80" class="w-12 h-12 rounded-full border rounded-full">
            <div>
              <p id="chatUserName" class="font-bold text-gray-800 text-lg">اسم المستخدم</p>
              <p id="chatUserStatus" class="text-xs text-green-600 font-semibold">● متصل الآن</p>
            </div>
          </div>

          <div class="text-right text-xs text-orange-600 font-bold">
            <p id="chatItemType" class="flex items-center gap-1 justify-end"></p>
          </div>
        </div>

        <div id="chatArea" class="p-4 space-y-4 overflow-y-auto h-[55vh] md:h-[420px]"></div>

        <div class="border-t bg-white p-4">
          <div class="flex items-center gap-3">
            <input id="chatInput" type="text"
                   class="flex-1 p-3 border rounded-xl bg-gray-50 focus:outline-none"
                   placeholder="اكتب رسالة...">
            <button onclick="sendChatMessage()"
                    class="px-5 py-3 bg-[var(--rukn-orange)] text-white rounded-xl hover:bg-orange-600 transition">
              إرسال
            </button>
            <button onclick="openMessages()"
                    class="px-4 py-3 border rounded-xl text-sm text-gray-700 hover:bg-gray-50 relative">
            <span class="inline-flex items-center gap-1">
  <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none">
    <path d="M15 18l-6-6 6-6"
          stroke="currentColor" stroke-width="2"/>
  </svg>
  الرجوع
</span>

            </button>
          </div>
        </div>
      </div>



</body>
</html>
